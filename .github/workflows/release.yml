name: Trusted release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Check out immutable tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"
      - name: Verify tag matches the single package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(python -c 'import sys; sys.path.insert(0,"src"); import mcp_tool_card_linter; print(mcp_tool_card_linter.__version__)')"
          test "v${PACKAGE_VERSION}" = "${GITHUB_REF_NAME}"
      - name: Build wheel and sdist
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check build cyclonedx-bom==7.3.0
          export SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)"
          python -m build --outdir dist-packages
          python -m venv product-venv
          product-venv/bin/python -m pip install --disable-pip-version-check dist-packages/*.whl
      - name: Generate SBOM and SHA-256 checksums
        shell: bash
        run: |
          mkdir release
          cyclonedx-py environment product-venv/bin/python \
            --pyproject pyproject.toml --mc-type library --output-reproducible \
            --output-format JSON --output-file release/sbom.cdx.json
          python - <<'PY'
          import json
          import os
          import uuid
          from pathlib import Path

          path = Path("release/sbom.cdx.json")
          sbom = json.loads(path.read_text(encoding="utf-8"))
          identity = (
              f"https://github.com/{os.environ['GITHUB_REPOSITORY']}"
              f"@{os.environ['GITHUB_SHA']}#{os.environ['GITHUB_REF_NAME']}"
          )
          sbom["serialNumber"] = f"urn:uuid:{uuid.uuid5(uuid.NAMESPACE_URL, identity)}"
          path.write_text(
              json.dumps(sbom, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY
          cd dist-packages
          sha256sum * > ../release/SHA256SUMS
      - name: Sign and attest package provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist-packages/*
      - name: Bind the CycloneDX SBOM to release artifacts
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist-packages/*
          sbom-path: release/sbom.cdx.json
      - name: Upload release bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-bundle
          path: |
            dist-packages/
            release/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mcp-tool-card-linter
    permissions:
      id-token: write
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-bundle
      - name: Publish through PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist-packages/
          attestations: true

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-bundle
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist-packages/* release/* \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag --generate-notes --draft
          gh release edit "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" --draft=false
