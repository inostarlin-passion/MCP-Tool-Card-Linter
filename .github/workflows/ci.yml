name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install project and quality tools
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Static lint
        run: ruff check src tests
      - name: Type check
        run: mypy src
      - name: Unit, integration, and system tests with coverage
        env:
          PYTHONWARNINGS: error::ResourceWarning
          PYTHONPATH: src
        run: >-
          python -m coverage run -m unittest discover -s tests -v
      - name: Enforce branch coverage
        run: |
          python -m coverage combine
          python -m coverage report --fail-under=75

  package:
    name: Build and clean-install artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Build wheel and sdist
        run: |
          python -m pip install --disable-pip-version-check build
          python -m build
      - name: Install wheel in a clean environment
        run: |
          python -m venv clean-venv
          clean-venv/bin/python -m pip install dist/*.whl
          clean-venv/bin/mcp-tool-card-linter --version
          clean-venv/bin/mcp-tool-card-linter lint --tools-file examples/good-tools.json --fail-on never --format none
      - name: Rebuild from sdist
        run: |
          python -m venv sdist-venv
          sdist-venv/bin/python -m pip install dist/*.tar.gz
          sdist-venv/bin/mcp-tool-card-linter list-rules --format json
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  performance:
    name: Uninstrumented performance budget
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install project
        run: python -m pip install --disable-pip-version-check -e .
      - name: Enforce 2,000-card time and memory budgets without coverage
        env:
          MCP_LINTER_ENFORCE_PERFORMANCE_BUDGET: "1"
          PYTHONPATH: src
        run: python -m unittest tests.system.test_performance_budget -v

  production-quality:
    name: Accuracy, fuzz, mutation, and soak gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install project
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Enforce explicitly-labelled rule accuracy gate
        run: >-
          mcp-tool-card-linter evaluate
          --corpus evaluation/rule_accuracy_v1.jsonl
          --min-precision 0.95 --min-recall 0.95
      - name: Run deterministic parser fuzz and input mutation suites
        env:
          PYTHONWARNINGS: error::ResourceWarning
          PYTHONPATH: src
        run: >-
          python -m unittest discover -s tests/fuzz -v &&
          python -m unittest discover -s tests/mutation -v
      - name: Run repeated stdio lifecycle soak gate
        env:
          MCP_LINTER_ENFORCE_SOAK: "1"
          PYTHONWARNINGS: error::ResourceWarning
          PYTHONPATH: src
        run: python -m unittest tests.system.test_soak_v1 -v

  reproducible-build:
    name: Bit-for-bit wheel and sdist reproducibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install build frontend
        run: python -m pip install --disable-pip-version-check build
      - name: Build twice from the same source epoch and compare bytes
        shell: bash
        run: |
          export SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)"
          mkdir -p "${RUNNER_TEMP}/repro-a" "${RUNNER_TEMP}/repro-b"
          python -m build --outdir "${RUNNER_TEMP}/repro-a"
          python -m build --outdir "${RUNNER_TEMP}/repro-b"
          cmp "${RUNNER_TEMP}/repro-a"/*.whl "${RUNNER_TEMP}/repro-b"/*.whl
          cmp "${RUNNER_TEMP}/repro-a"/*.tar.gz "${RUNNER_TEMP}/repro-b"/*.tar.gz
          sha256sum "${RUNNER_TEMP}/repro-a"/*

  mcp-conformance:
    name: Official MCP client conformance / initialize
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Set up Node.js for the official runner
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tests/conformance/package-lock.json
      - name: Install project
        run: python -m pip install --disable-pip-version-check -e .
      - name: Install integrity-locked official runner
        run: npm ci --ignore-scripts --prefix tests/conformance
      - name: Run pinned official client scenarios
        run: |
          tests/conformance/node_modules/.bin/conformance client \
            --command "python tests/conformance/client.py" \
            --scenario initialize \
            --spec-version 2025-11-25
          tests/conformance/node_modules/.bin/conformance client \
            --command "python tests/conformance/client.py" \
            --scenario sse-retry \
            --spec-version 2025-11-25
